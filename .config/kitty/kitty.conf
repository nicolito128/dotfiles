# Performance tuning
input_delay 0
repaint_delay 2
sync_to_monitor no
wayland_enable_ime no

# Window layout
remember_window_size yes
remember_window_position yes

# Remote control
remote_control_password "control opacity" set-background-opacity 

# Fonts
#font_family NotoSansM Nerd Font
font_family AdwaitaMono Nerd Font
font_size 12.0
bold_font auto
italic_font auto
bold_italic_font auto

# Color scheme
background_opacity 0.9
dynamic_background_opacity yes

map f1 set_background_opacity +0.1
map f2 set_background_opacity -0.1
map f3 set_background_opacity 1

# Windows
map ctrl+shift+enter new_window_with_cwd

# Tabs
map ctrl+shift+t new_tab_with_cwd

# BEGIN_KITTY_THEME
# Vague
include current-theme.conf
# END_KITTY_THEME
